name: Publish to MCP Registry

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: mcp-registry-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Verify release metadata
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const server = JSON.parse(readFileSync("server.json", "utf8"));
          const expectedTag = `v${pkg.version}`;
          const packageMetadata = server.packages?.[0];
          const errors = [];
          if (process.env.RELEASE_TAG !== expectedTag) errors.push(`release tag ${process.env.RELEASE_TAG} != ${expectedTag}`);
          if (pkg.mcpName !== server.name) errors.push("package.json mcpName != server.json name");
          if (server.version !== pkg.version) errors.push("server version != npm version");
          if (packageMetadata?.version !== pkg.version) errors.push("Registry package version != npm version");
          if (packageMetadata?.identifier !== pkg.name) errors.push("Registry package identifier != npm package name");
          if (errors.length > 0) {
            console.error(errors.join("\n"));
            process.exit(1);
          }
          NODE

      - name: Wait for exact npm package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for attempt in $(seq 1 18); do
            PUBLISHED=$(npm view "agentic-sdlc-mcp@$VERSION" version 2>/dev/null || true)
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "npm package agentic-sdlc-mcp@$VERSION is available"
              exit 0
            fi
            echo "Attempt $attempt/18: waiting for npm package version $VERSION"
            sleep 10
          done
          echo "npm package agentic-sdlc-mcp@$VERSION was not available before timeout" >&2
          exit 1

      - name: Install verified mcp-publisher v1.7.9
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            --output mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" \
            | sha256sum --check
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help

      - name: Authenticate to MCP Registry with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata
        run: ./mcp-publisher publish

      - name: Verify Registry publication
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME="io.github.SakuraCianna/agentic-sdlc-mcp"
          for attempt in $(seq 1 12); do
            curl --fail --silent --show-error --get \
              --data-urlencode "search=$NAME" \
              "https://registry.modelcontextprotocol.io/v0.1/servers" \
              --output registry-response.json
            if node --input-type=module - "$NAME" "$VERSION" <<'NODE'
          import { readFileSync } from "node:fs";
          const [, , expectedName, expectedVersion] = process.argv;
          const response = JSON.parse(readFileSync("registry-response.json", "utf8"));
          const found = (response.servers ?? []).some((entry) => {
            const server = entry.server ?? entry;
            const npmPackage = (server.packages ?? []).find(
              (pkg) => pkg.registryType === "npm" && pkg.identifier === "agentic-sdlc-mcp"
            );
            return (
              server.name === expectedName &&
              server.version === expectedVersion &&
              npmPackage?.version === expectedVersion &&
              npmPackage?.transport?.type === "stdio"
            );
          });
          process.exit(found ? 0 : 1);
          NODE
            then
              echo "Registry published $NAME@$VERSION"
              exit 0
            fi
            echo "Attempt $attempt/12: waiting for Registry discovery"
            sleep 10
          done
          echo "Registry did not return $NAME@$VERSION before timeout" >&2
          exit 1
