name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Pre-publish checks (build, typecheck, test, smoke)
        run: npm run prepublishOnly

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1. Keep dependency
      # installation on the npm version bundled with Node, then upgrade only
      # for the publish step to reduce install-time compatibility surprises.
      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      # No NPM_TOKEN — npm exchanges this workflow's OIDC token for a short-lived
      # publish credential. Requires the package's Trusted Publisher to be
      # configured on npmjs.com first (see README).
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
